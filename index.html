function drawGame() {
    // clear the canvas
    context.clearRect(0, 0, canvas.width, canvas.height);
    
    // display the snake as "$"
    for (let i = 0; i < snake.length; i++) {
        context.fillText("$", snake[i].x, snake[i].y);
    }
    
    // display the food as "$"
    context.fillText("$", food.x, food.y);
}
